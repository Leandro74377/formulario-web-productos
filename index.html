<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vista Registro de Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-10">

        <div class="card shadow">
          <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Formulario de Registro de Productos</h3>
          </div>

          <div class="card-body">
            <form id="formProducto">
              <div class="row mb-3">
                <div class="col-md-4">
                  <label for="idProducto" class="form-label">ID</label>
                  <input type="text" class="form-control" id="idProducto" placeholder="Ingrese el ID">
                </div>

                <div class="col-md-4">
                  <label for="nombreProducto" class="form-label">Nombre</label>
                  <input type="text" class="form-control" id="nombreProducto" placeholder="Ingrese el nombre">
                </div>

                <div class="col-md-4">
                  <label for="tipoProducto" class="form-label">Tipo</label>
                  <input type="text" class="form-control" id="tipoProducto" placeholder="Ingrese el tipo">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-4">
                  <label for="precioUnitario" class="form-label">Precio Unitario</label>
                  <input type="number" class="form-control" id="precioUnitario" placeholder="Ingrese el precio unitario">
                </div>

                <div class="col-md-4">
                  <label for="cantidad" class="form-label">Cantidad</label>
                  <input type="number" class="form-control" id="cantidad" placeholder="Ingrese la cantidad">
                </div>

                <div class="col-md-4">
                  <label for="precioTotal" class="form-label">Precio Total</label>
                  <input type="text" class="form-control" id="precioTotal" placeholder="Precio total" readonly>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="button" class="btn btn-success" onclick="guardarProducto()">Guardar Producto</button>
                <button type="reset" class="btn btn-secondary">Nuevo</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow mt-4">
          <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Lista de Productos</h4>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-bordered table-striped text-center">
                <thead class="table-primary">
                  <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Precio Total</th>
                  </tr>
                </thead>
                <tbody id="tablaProductos"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
    // Función para calcular el total automáticamente
    const precioUnitario = document.getElementById("precioUnitario");
    const cantidad = document.getElementById("cantidad");
    const precioTotal = document.getElementById("precioTotal");

    precioUnitario.addEventListener("input", calcularTotal);
    cantidad.addEventListener("input", calcularTotal);

    function calcularTotal() {
        let precio = parseFloat(precioUnitario.value) || 0;
        let cant = parseInt(cantidad.value) || 0;
        let total = precio * cant;
        precioTotal.value = total.toFixed(2);
    }

    // Función para guardar el producto en la tabla
    function guardarProducto() {
        let id = document.getElementById("idProducto").value.trim();
        let nombre = document.getElementById("nombreProducto").value.trim();
        let tipo = document.getElementById("tipoProducto").value.trim();
        let precio = parseFloat(document.getElementById("precioUnitario").value.trim()) || 0;
        let cant = parseInt(document.getElementById("cantidad").value.trim()) || 0;
        let total = parseFloat(precioTotal.value.trim()) || 0;

        if (!id || !nombre || !tipo || cant <= 0 || precio <= 0) {
            alert("Por favor, ingresa todos los datos correctamente.");
            return;
        }

        // Crear la fila de la tabla
        let fila = `
            <tr>
                <td>${id}</td>
                <td>${nombre}</td>
                <td>${tipo}</td>
                <td>${precio.toFixed(2)}</td>
                <td>${cant}</td>
                <td>${total.toFixed(2)}</td>
            </tr>
        `;

        document.getElementById("tablaProductos").innerHTML += fila;

        // Limpiar el formulario
        document.getElementById("formProducto").reset();
        precioTotal.value = "";
    }

    // Ejemplo de función para limpiar total después de un tiempo (opcional)
    function limpiarTotal() {
        setTimeout(() => {
            precioTotal.value = "";
        }, 1000);
    }
</script> 
</body>
</html>>
